name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests:
    strategy:
      matrix:
        # ref: https://github.com/actions/runner-images
        os: [ubuntu-22.04, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Lua (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y lua5.4

      - name: install Lua (macOS)
        if: runner.os == 'macOS'
        run: brew install lua

      - name: install Lua (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install lua --no-progress -y

          $candidates = @(
            (Get-Command lua -ErrorAction SilentlyContinue).Source,
            "$env:ChocolateyInstall\\bin\\lua.exe",
            "$env:ChocolateyInstall\\lib\\lua\\tools\\lua.exe",
            "${env:ProgramFiles(x86)}\\Lua\\5.1\\lua.exe",
            "$env:ProgramFiles\\Lua\\5.1\\lua.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $lua = $candidates | Select-Object -First 1
          if (-not $lua) { throw "lua.exe not found after installation" }

          "LUA_EXE=$lua" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Split-Path $lua) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: run unit tests (Unix-like)
        if: runner.os != 'Windows'
        run: |
          LUA=$(command -v lua5.4 2>/dev/null || command -v lua)
          $LUA tests/test_mongo_utils.lua
          $LUA tests/test_mongosh_utils.lua

      - name: run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & $env:LUA_EXE tests/test_mongo_utils.lua
          & $env:LUA_EXE tests/test_mongosh_utils.lua

  e2e_tests:
    strategy:
      matrix:
        # ref: https://github.com/actions/runner-images
        os: [ubuntu-22.04, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    env:
      MONGOSH_VERSION: "2.8.3"
    steps:
      - uses: actions/checkout@v4

      - name: install vfox (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/versionfox/ /" | sudo tee /etc/apt/sources.list.d/versionfox.list
          sudo apt-get update
          sudo apt-get install vfox

      - name: install vfox (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap version-fox/tap
          brew install vfox

      - name: install scoop (Windows)
        if: runner.os == 'Windows'
        uses: MinoruSekine/setup-scoop@v4

      - name: install vfox (Windows)
        if: runner.os == 'Windows'
        run: scoop install vfox

      - name: add vfox-mongo plugin
        if: runner.os == 'Windows'
        run: |
          vfox add --source https://github.com/${{ github.repository_owner }}/vfox-mongo/archive/$env:GITHUB_REF.zip mongo

      - name: add vfox-mongo plugin
        if: runner.os != 'Windows'
        run: |
          vfox add --source https://github.com/${{ github.repository_owner }}/vfox-mongo/archive/${GITHUB_REF}.zip mongo

      - name: verify vfox search shows clean version numbers (Unix-like)
        if: runner.os != 'Windows'
        run: |
          # Verify the output does NOT contain platform-specific prefixes
          output=$(vfox search mongo 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -qE '^[[:space:]]*(x86_64|aarch64|macos|windows)-'; then
            echo "ERROR: vfox search returned platform-specific version strings instead of clean version numbers"
            exit 1
          fi

      - name: install mongo server by vfox-mongo plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          vfox install mongo@8.0.6
          eval "$(vfox activate bash)"
          vfox use -g mongo@8.0.6
          eval "$(vfox activate bash)"
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          mongod --help
          mongosh --version

      - name: install mongo server by vfox-mongo plugin (Darwin)
        if: runner.os == 'macOS'
        run: |
          vfox install mongo@7.3.4
          eval "$(vfox activate bash)"
          vfox use -g mongo@7.3.4
          eval "$(vfox activate bash)"
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          mongod --help
          mongosh --version

      - name: install mongo server by vfox-mongo plugin (Windows)
        if: runner.os == 'Windows'
        run: |
          vfox install mongo@7.3.0
          Invoke-Expression "$(vfox activate pwsh)"
          vfox use -g mongo@7.3.0
          Invoke-Expression "$(vfox activate pwsh)"
          echo "===============PATH==============="
          echo $env:PATH
          echo "===============PATH==============="
          mongod --help
          mongosh --version

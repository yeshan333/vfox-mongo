name: E2E tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests:
    strategy:
      matrix:
        # ref: https://github.com/actions/runner-images
        os: [ubuntu-22.04, macos-13, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install Lua (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y lua5.4

      - name: install Lua (macOS)
        if: runner.os == 'macOS'
        run: brew install lua

      - name: install Lua (Windows)
        if: runner.os == 'Windows'
        run: choco install lua --no-progress -y

      - name: run unit tests (Unix-like)
        if: runner.os != 'Windows'
        run: |
          LUA=$(command -v lua5.4 2>/dev/null || command -v lua)
          $LUA tests/test_mongo_utils.lua

      - name: run unit tests (Windows)
        if: runner.os == 'Windows'
        run: lua tests\test_mongo_utils.lua

  e2e_tests:
    strategy:
      matrix:
        # ref: https://github.com/actions/runner-images
        os: [ubuntu-22.04, macos-13, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '^1.24.2' # The Go version to download (if necessary) and use.

      - name: build & install vfox (Unix-like)
        if: runner.os != 'Windows'
        run: |
          git clone https://github.com/version-fox/vfox.git
          cd vfox
          go build -o vfox
          chmod +x vfox
          cp vfox /usr/local/bin

      - name: build & install vfox (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/version-fox/vfox.git
          cd vfox
          go build -o vfox.exe
          echo "$pwd" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          ./vfox.exe -version

      - name: add vfox-mongo plugin
        if: runner.os == 'Windows'
        run: |
          vfox add --source https://github.com/${{ github.repository_owner }}/vfox-mongo/archive/$env:GITHUB_REF.zip mongo

      - name: add vfox-mongo plugin
        if: runner.os != 'Windows'
        run: |
          vfox add --source https://github.com/${{ github.repository_owner }}/vfox-mongo/archive/${GITHUB_REF}.zip mongo

      - name: verify vfox search shows clean version numbers (Unix-like)
        if: runner.os != 'Windows'
        run: |
          # Verify the output does NOT contain platform-specific prefixes
          output=$(vfox search mongo 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -qE '^[[:space:]]*(x86_64|aarch64|macos|windows)-'; then
            echo "ERROR: vfox search returned platform-specific version strings instead of clean version numbers"
            exit 1
          fi

      - name: install mongo server by vfox-mongo plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          eval "$(vfox activate bash)"
          vfox install mongo@8.0.6
          vfox use -g mongo@8.0.6
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          mongod --help

      - name: install mongo server by vfox-mongo plugin (Darwin)
        if: runner.os == 'macOS'
        run: |
          eval "$(vfox activate bash)"
          vfox install mongo@7.3.1
          vfox use -g mongo@7.3.1
          echo "===============PATH==============="
          echo $PATH
          echo "===============PATH==============="
          mongod --help

      - name: install mongo server by vfox-mongo plugin (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-Expression "$(vfox activate pwsh)"
          vfox install mongo@7.3.0
          vfox use -g mongo@7.3.0
          echo "===============PATH==============="
          echo $env:PATH
          echo "===============PATH==============="
          mongod --help